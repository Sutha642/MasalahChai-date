<!DOCTYPE html>
<html>
<head>
    <title>Special Question 💖</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #ffe6f0;
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 20px;
            cursor: pointer;
        }

        #noBtn {
            position: absolute;
            transition: all 0.2s ease;
        }
    </style>
</head>

<body>

<h1>Damayanthy Tea kudike povoma?😁💕</h1>

<form action="https://formspree.io/f/mjgprrqe" method="POST">
    <input type="hidden" name="answer" id="answer" value="Yes">

    <!-- YES submits form -->
    <button type="submit">Povom😊💖</button>
</form>

<!-- NO button outside form -->
<button type="button" id="noBtn">No 😢</button>

<!-- Sound -->
<audio id="runSound">
    <source src="https://www.soundjay.com/button/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
const noBtn = document.getElementById("noBtn");
const sound = document.getElementById("runSound");

const messages = [
    "No 😢",
    "Damayanthy are you sure? 🥺",
    "Think again 😭",
    "Damayanthyyyy?? 🥺",
    "Don't do this 😩",
    "Last chance 😳"
];

let msgIndex = 0;

noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    sound.currentTime = 0;
    sound.play().catch(()=>{});

    msgIndex++;
    if (msgIndex >= messages.length) msgIndex = messages.length - 1;
    noBtn.innerText = messages[msgIndex];
});

noBtn.addEventListener("click", function() {
    alert("Nice try 😏 You can't say no!");
});
</script>

</body>
</html>
