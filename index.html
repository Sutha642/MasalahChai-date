<!DOCTYPE html>
<html>
<head>
    <title>Special Question 💖</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #ffe6f0;
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 20px;
            cursor: pointer;
        }

        #noBtn {
            position: absolute;
            transition: all 0.2s ease;
        }

        #successMsg {
            font-size: 24px;
            color: #ff3399;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>

<h1>Damayanthy Tea kudike povoma?😁💕</h1>

<form id="form" action="https://formspree.io/f/mjgprrqe" method="POST">
    <input type="hidden" name="answer" value="Yes">

    <!-- IMPORTANT: prevent instant submit -->
    <button type="button" onclick="handleYes()">Povom😊💖</button>
</form>

<div id="successMsg">Sandhosham Damayanthy 😍</div>

<button type="button" id="noBtn">No 😢</button>

<audio id="runSound">
    <source src="https://www.soundjay.com/button/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
function handleYes() {
    // Show message
    document.getElementById("successMsg").style.display = "block";

    // Hide buttons
    document.querySelector("form").style.display = "none";
    document.getElementById("noBtn").style.display = "none";

    // Submit after 2 seconds
    setTimeout(function() {
        document.getElementById("form").submit();
    }, 2000);
}

// NO button logic
const noBtn = document.getElementById("noBtn");
const sound = document.getElementById("runSound");

const messages = [
    "No 😢",
    "Damayanthy are you sure? 🥺",
    "manese valikidhu lah 😭",
    "Enne Kathe?? 🥺",
    "now or never🖤",
    "Damayanthyyyyy 😁😂"
];

let msgIndex = 0;

noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    sound.currentTime = 0;
    sound.play().catch(()=>{});

    msgIndex++;
    if (msgIndex >= messages.length) msgIndex = messages.length - 1;
    noBtn.innerText = messages[msgIndex];
});

noBtn.addEventListener("click", function() {
    alert("Damayanthy Patiyaa😏");
});
</script>

</body>
</html>
