<script>
function setAnswer(ans) {
    document.getElementById("answer").value = ans;
}

// No button logic
const noBtn = document.getElementById("noBtn");
const sound = document.getElementById("runSound");

const messages = [
    "No 😢",
    "Damayanthy are you sure? 🥺",
    "Think again 😭",
    "Damayanthyyyy?? 🥺",
    "Don't do this 😩",
    "Last chance 😳"
];

let msgIndex = 0;

noBtn.addEventListener("mouseover", function() {
    // Move randomly
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // Play sound
    sound.currentTime = 0;
    sound.play();

    // Change text only (NO SIZE CHANGE)
    msgIndex++;
    if (msgIndex >= messages.length) msgIndex = messages.length - 1;
    noBtn.innerText = messages[msgIndex];
});

// If user somehow clicks it 😏
noBtn.addEventListener("click", function() {
    alert("Nice try 😏 You can't say no!");
});
</script>
